[build]
  command = "npm run build"
  publish = "dist"
  base = "frontend"

[context.production.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/proxy-api/:splat" # Proxy to a function or a direct URL
  status = 200
  force = true

# Fallback for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
